name: Ping Render App

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # lets you run it manually too

jobs:
  wakeup:
    runs-on: ubuntu-latest
    steps:
      - name: Send wake-up request
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://algolive.onrender.com/ping
